name: Reusable iOS Release

# Build + sign + upload for a single app. Callers pass the scheme and the lane
# (`beta` → TestFlight, `release` → App Store). All Apple credentials arrive as
# secrets (use `secrets: inherit` from the caller).
on:
  workflow_call:
    inputs:
      scheme:
        required: true
        type: string
      lane:
        description: "fastlane lane: beta or release"
        required: true
        type: string
      runner:
        required: false
        type: string
        default: "macos-14"
      xcode-version:
        required: false
        type: string
        default: "16.1"
    secrets:
      APP_IDENTIFIER:
        required: true
      APPLE_ID:
        required: true
      TEAM_ID:
        required: true
      APP_STORE_CONNECT_API_KEY_ID:
        required: true
      APP_STORE_CONNECT_API_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_API_KEY:
        required: true
      MATCH_GIT_URL:
        required: true
      MATCH_PASSWORD:
        required: true
      MATCH_GIT_BASIC_AUTHORIZATION:
        required: true
      KEYCHAIN_PASSWORD:
        required: true

jobs:
  deploy:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ inputs.xcode-version }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ inputs.xcode-version }}

      - name: Install pinned tools (Tuist, SwiftLint, SwiftFormat)
        uses: jdx/mise-action@v2

      - name: Set up Ruby + bundler cache
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Run ${{ inputs.lane }} lane
        env:
          APP_SCHEME: ${{ inputs.scheme }}
          BUILD_NUMBER: ${{ github.run_number }}
          APP_IDENTIFIER: ${{ secrets.APP_IDENTIFIER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: bundle exec fastlane ios ${{ inputs.lane }}

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ inputs.scheme }}
          path: |
            ~/Library/Logs/gym
            fastlane/test_output
          if-no-files-found: ignore
